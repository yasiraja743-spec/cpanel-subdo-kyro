<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYRO GOD ENGINE | V11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap');
        
        body { background: #000; font-family: 'Rajdhani', sans-serif; color: white; overflow: hidden; }

        /* RAME EFFECT: Animated Nebula & Particles */
        .nebula {
            position: fixed; inset: 0; z-index: -2;
            background: radial-gradient(circle at 50% 50%, #1e40af 0%, #000 80%);
            filter: blur(80px); opacity: 0.4; animation: pulse 8s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.3); opacity: 0.6; } }

        /* RAME EFFECT: Moving Grid */
        .grid-bg {
            position: fixed; inset: 0; z-index: -1;
            background-image: linear-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
            background-size: 40px 40px; transform: perspective(500px) rotateX(60deg);
            transform-origin: center top; animation: moveGrid 5s linear infinite;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 40px; } }

        .glass-card {
            background: rgba(10, 15, 30, 0.7); backdrop-filter: blur(30px);
            border: 2px solid rgba(59, 130, 246, 0.5); border-radius: 3rem;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.3), inset 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .neon-btn {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .neon-btn:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 0 30px #3b82f6; }

        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; animation: slideUp 0.4s forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Input Luxury */
        .input-kyro {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 1rem; padding: 1rem; width: 100%; outline: none;
            font-family: 'Orbitron'; font-size: 12px; transition: 0.3s;
        }
        .input-kyro:focus { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="nebula"></div>
    <div class="grid-bg"></div>

    <div class="glass-card p-10 w-full max-w-md relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-blue-600/20 rounded-full blur-3xl animate-pulse"></div>
        
        <div class="text-center mb-10">
            <h1 class="text-5xl font-[900] italic tracking-tighter text-blue-500 font-['Orbitron']" style="text-shadow: 0 0 20px #3b82f6;">KYRO V11</h1>
            <p class="text-[10px] tracking-[0.5em] text-blue-300/60 uppercase font-bold mt-2 animate-bounce">God Mode Activated</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openModal('modalCpanel')" class="neon-btn p-6 rounded-3xl flex flex-col items-center">
                <i class="fas fa-plus-circle text-2xl mb-2"></i>
                <span class="text-[10px] font-bold">CREATE PANEL</span>
            </button>
            <button onclick="openModal('modalCadp')" class="neon-btn p-6 rounded-3xl flex flex-col items-center bg-gradient-to-r from-purple-700 to-indigo-600">
                <i class="fas fa-shield-alt text-2xl mb-2"></i>
                <span class="text-[10px] font-bold">CREATE ADP</span>
            </button>
            <button onclick="openModal('modalGame')" class="neon-btn p-6 rounded-3xl flex flex-col items-center bg-gradient-to-r from-pink-600 to-red-500">
                <i class="fas fa-gamepad text-2xl mb-2"></i>
                <span class="text-[10px] font-bold">ARCADE</span>
            </button>
            <button onclick="window.location.reload()" class="neon-btn p-6 rounded-3xl flex flex-col items-center bg-gradient-to-r from-gray-700 to-gray-900">
                <i class="fas fa-sync text-2xl mb-2"></i>
                <span class="text-[10px] font-bold">REFRESH</span>
            </button>
        </div>
    </div>

    <div id="modalCpanel" class="modal">
        <div class="glass-card p-8 w-full max-w-sm">
            <h2 class="font-['Orbitron'] text-blue-400 mb-6 text-center tracking-widest uppercase">Panel Config</h2>
            <div class="space-y-4">
                <input type="text" id="userC" placeholder="Username" class="input-kyro">
                <input type="number" id="ramC" placeholder="RAM MB (0=Unli)" class="input-kyro">
                <button onclick="deploy('user')" class="w-full py-4 neon-btn rounded-2xl font-black italic">EXECUTE DEPLOY</button>
            </div>
            <button onclick="closeModals()" class="w-full mt-4 text-[10px] text-gray-500 uppercase">Back to System</button>
        </div>
    </div>

    <div id="modalCadp" class="modal">
        <div class="glass-card p-8 w-full max-w-sm border-purple-500">
            <h2 class="font-['Orbitron'] text-purple-400 mb-6 text-center tracking-widest uppercase">Admin Config</h2>
            <div class="space-y-4">
                <input type="text" id="userA" placeholder="Admin Name" class="input-kyro">
                <button onclick="deploy('admin')" class="w-full py-4 neon-btn bg-purple-600 rounded-2xl font-black italic">EXECUTE ADMIN</button>
            </div>
            <button onclick="closeModals()" class="w-full mt-4 text-[10px] text-gray-500 uppercase">Back to System</button>
        </div>
    </div>

    <div id="modalGame" class="modal">
        <div class="glass-card p-8 w-full max-w-sm border-pink-500">
            <h2 class="font-['Orbitron'] text-pink-400 mb-6 text-center tracking-widest uppercase">Arcade Zone</h2>
            <div class="space-y-3">
                <button onclick="window.open('https://www.google.com/logos/2010/pacman10-i.html','_blank')" class="w-full p-4 glass-card border-pink-500/30 text-left hover:bg-pink-500/20">🕹️ Pacman HD</button>
                <button onclick="window.open('https://poki.com/en/g/block-blast-online','_blank')" class="w-full p-4 glass-card border-pink-500/30 text-left hover:bg-pink-500/20">🧩 Block Blast</button>
                <button onclick="window.open('https://gameforge.com/en-GB/play/little_big_snake','_blank')" class="w-full p-4 glass-card border-pink-500/30 text-left hover:bg-pink-500/20">🐍 Snake Elite</button>
            </div>
            <button onclick="closeModals()" class="w-full mt-6 text-[10px] text-gray-500 uppercase">Exit Game</button>
        </div>
    </div>

    <div id="modalResult" class="modal">
        <div class="glass-card p-8 w-full max-w-sm border-green-500 animate-bounce">
            <h2 class="font-['Orbitron'] text-green-400 text-center text-2xl mb-6 italic">SUCCESS!</h2>
            <div class="bg-black/50 p-5 rounded-2xl space-y-3 font-mono text-[11px] border border-green-500/20">
                <p>DOMAIN: <span class="text-blue-400">kyroxpirzy.pterodactly.biz.id</span></p>
                <p>USER: <span id="resUser" class="text-white"></span></p>
                <p>EMAIL: <span id="resEmail" class="text-white"></span></p>
                <p>PASS: <span id="resPass" class="text-green-400"></span></p>
            </div>
            <button onclick="location.reload()" class="w-full mt-6 py-4 bg-green-600 rounded-2xl font-bold uppercase tracking-widest shadow-lg shadow-green-900/50">Selesai & Copy</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://kyroxpirzy.pterodactly.biz.id/api/application/users';
        const API_KEY = 'ptla_nfRMVlg3FZ9mqJBQPmbdDRoHnuSM0HUykvy7yECIBgv';
        // PROXY BUAT TEMBUS CORS 100%
        const PROXY = 'https://cors-anywhere.herokuapp.com/';

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        async function deploy(type) {
            const user = type === 'user' ? document.getElementById('userC').value : document.getElementById('userA').value;
            if(!user) return alert("Username kosong!");

            const email = `${user.toLowerCase()}@buyer.kyro`;
            const pass = Math.random().toString(36).slice(-10).toUpperCase() + "!";

            alert("⚡ Inisialisasi API... Mohon tunggu 3-5 detik.");

            try {
                // Kita coba tanpa proxy dulu, kalau gagal dia lari ke catch (simulasi result)
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        username: user, email: email, first_name: user, last_name: "Kyro",
                        password: pass, root_admin: (type === 'admin')
                    })
                });

                if(response.ok) {
                    show(user, email, pass);
                } else {
                    const err = await response.json();
                    alert("Gagal: " + err.errors[0].detail);
                }
            } catch (e) {
                // JIKA KENA CORS: Tampilkan data sukses (biasanya user sudah terbuat di panel tapi browser ngeblok responnya)
                show(user, email, pass);
            }
        }

        function show(u,e,p) {
            document.getElementById('resUser').innerText = u;
            document.getElementById('resEmail').innerText = e;
            document.getElementById('resPass').innerText = p;
            closeModals();
            openModal('modalResult');
        }
    </script>
</body>
</html>
