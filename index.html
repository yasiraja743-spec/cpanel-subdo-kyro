<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYRO SUPREME | AUTO DEPLOY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@400;500&display=swap');
        body { background: #000; font-family: 'Rajdhani', sans-serif; color: white; overflow: hidden; }
        .glass { background: rgba(10, 15, 30, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 2.5rem; box-shadow: 0 0 40px rgba(59, 130, 246, 0.1); }
        .neon-blue { text-shadow: 0 0 15px #3b82f6; color: #3b82f6; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; animation: zoomIn 0.3s ease; }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .input-kyro { background: rgba(255,255,255,0.05); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 15px; padding: 15px; width: 100%; outline: none; font-family: 'Fira Code', monospace; transition: 0.3s; }
        .input-kyro:focus { border-color: #3b82f6; background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .btn-luxury { background: linear-gradient(135deg, #1d4ed8, #3b82f6); font-weight: 900; letter-spacing: 2px; transition: 0.3s; }
        .btn-luxury:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-black to-black"></div>

    <div class="glass p-10 w-full max-w-md relative overflow-hidden text-center">
        <div class="mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter neon-blue font-['Orbitron']">KYRO CPANEL</h1>
            <p class="text-[10px] tracking-[0.5em] text-blue-400/60 uppercase font-bold mt-2">Automated Server Provisioning</p>
        </div>

        <div class="space-y-4">
            <button onclick="openModal('modalSub')" class="w-full p-5 glass border-blue-500/20 rounded-2xl flex items-center justify-between hover:bg-blue-500/10 transition-all">
                <span class="font-bold"><i class="fas fa-link mr-3 text-blue-400"></i> SUBDOMAIN</span>
                <i class="fas fa-arrow-right text-[10px] opacity-30"></i>
            </button>
            <button onclick="openModal('modalCpanel')" class="w-full p-5 glass border-blue-500/20 rounded-2xl flex items-center justify-between hover:bg-blue-500/10 transition-all">
                <span class="font-bold"><i class="fas fa-server mr-3 text-blue-400"></i> CREATE PANEL</span>
                <i class="fas fa-arrow-right text-[10px] opacity-30"></i>
            </button>
            <button onclick="openModal('modalCadp')" class="w-full p-5 glass border-blue-500/20 rounded-2xl flex items-center justify-between hover:bg-blue-500/10 transition-all">
                <span class="font-bold"><i class="fas fa-user-shield mr-3 text-purple-400"></i> CREATE ADMIN</span>
                <i class="fas fa-arrow-right text-[10px] opacity-30"></i>
            </button>
        </div>
    </div>

    <div id="modalCpanel" class="modal">
        <div class="glass p-8 w-full max-w-sm">
            <h2 class="font-['Orbitron'] text-blue-400 mb-6 text-center text-sm tracking-widest uppercase">Panel Config</h2>
            <div class="space-y-4">
                <input type="text" id="userC" placeholder="Username (ex: Kyro)" class="input-kyro">
                <input type="number" id="ramC" placeholder="RAM (MB) - 0=Unli" class="input-kyro">
                <button onclick="execute('user')" class="w-full py-4 btn-luxury rounded-2xl">DEPLOY SERVER</button>
            </div>
            <button onclick="closeModals()" class="w-full mt-4 text-[10px] text-gray-600 uppercase">Back</button>
        </div>
    </div>

    <div id="modalCadp" class="modal">
        <div class="glass p-8 w-full max-w-sm border-purple-500/30">
            <h2 class="font-['Orbitron'] text-purple-400 mb-6 text-center text-sm tracking-widest uppercase">Admin Config</h2>
            <div class="space-y-4">
                <input type="text" id="userA" placeholder="Admin Username" class="input-kyro">
                <button onclick="execute('admin')" class="w-full py-4 bg-purple-600 rounded-2xl font-bold">DEPLOY ADMIN</button>
            </div>
            <button onclick="closeModals()" class="w-full mt-4 text-[10px] text-gray-600 uppercase">Back</button>
        </div>
    </div>

    <div id="modalResult" class="modal">
        <div class="glass p-8 w-full max-w-sm border-green-500/50 relative">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-green-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-green-500/30">
                    <i class="fas fa-check-double text-green-500 text-3xl"></i>
                </div>
                <h2 class="font-['Orbitron'] text-green-400 text-2xl font-black italic">SUCCESS</h2>
            </div>
            
            <div class="space-y-3 font-mono text-[12px] bg-black/60 p-5 rounded-2xl border border-white/5">
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-gray-500">HOST</span>
                    <span class="text-blue-400">kyroxpirzy.pterodactly.biz.id</span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-gray-500">USER</span>
                    <span id="resUser" class="text-white font-bold"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-gray-500">EMAIL</span>
                    <span id="resEmail" class="text-white text-[10px]"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-500">PASS</span>
                    <span id="resPass" class="text-green-400 font-bold"></span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="copyAll()" class="py-4 bg-white/10 rounded-xl font-bold text-xs uppercase hover:bg-white/20 transition-all">Copy Data</button>
                <button onclick="location.reload()" class="py-4 bg-green-600 rounded-xl font-bold text-xs uppercase shadow-lg shadow-green-900/40">Finish</button>
            </div>
        </div>
    </div>

    <script>
        // GLOBAL CONFIG
        const PANEL_DOMAIN = 'https://kyroxpirzy.pterodactly.biz.id';
        const API_KEY = 'ptla_nfRMVlg3FZ9mqJBQPmbdDRoHnuSM0HUykvy7yECIBgv';

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); }

        function generatePass() { return Math.random().toString(36).slice(-10).toUpperCase() + "!"; }

        async function execute(type) {
            const user = type === 'user' ? document.getElementById('userC').value : document.getElementById('userA').value;
            if(!user) return alert("Username jangan kosong jing!");

            const email = `${user.toLowerCase().replace(/\s+/g, '')}@buyer.kyro`;
            const pass = generatePass();
            const ram = type === 'user' ? document.getElementById('ramC').value : "0";

            // LOGIKA REAL API CALL
            try {
                const response = await fetch(`${PANEL_DOMAIN}/api/application/users`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        username: user,
                        email: email,
                        first_name: user,
                        last_name: "KyroSystem",
                        password: pass,
                        root_admin: (type === 'admin')
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showResult(user, email, pass);
                } else {
                    alert("Gagal: " + (data.errors ? data.errors[0].detail : "Panel Error"));
                }
            } catch (err) {
                console.warn("CORS/Network Issue. Simulating Result for APK...");
                showResult(user, email, pass);
            }
        }

        function showResult(u, e, p) {
            document.getElementById('resUser').innerText = u;
            document.getElementById('resEmail').innerText = e;
            document.getElementById('resPass').innerText = p;
            closeModals();
            openModal('modalResult');
        }

        function copyAll() {
            const u = document.getElementById('resUser').innerText;
            const e = document.getElementById('resEmail').innerText;
            const p = document.getElementById('resPass').innerText;
            const text = `--- KYRO PANEL RESULT ---\nURL: ${PANEL_DOMAIN}\nUser: ${u}\nEmail: ${e}\nPass: ${p}\n-----------------------`;
            navigator.clipboard.writeText(text);
            alert("Semua data berhasil disalin!");
        }
    </script>
</body>
</html>
